<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary – Payment Terms</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #273548;
    --border: #334155;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* HEADER */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.2rem; font-weight: 700; color: var(--accent2); }
  header span { background: var(--accent); color: #fff; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; }

  /* TABS */
  .tabs { display: flex; gap: 4px; padding: 20px 24px 0; flex-wrap: wrap; }
  .tab { padding: 10px 22px; border-radius: 10px 10px 0 0; border: 1px solid var(--border); border-bottom: none; background: var(--surface); color: var(--muted); font-size: 0.9rem; cursor: pointer; transition: all .2s; font-weight: 500; }
  .tab.active { background: var(--surface2); color: var(--text); border-bottom: 2px solid var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  /* PANELS */
  .panel { display: none; padding: 24px; }
  .panel.active { display: block; }

  /* ── WORD LIST ── */
  .word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .word-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: border-color .2s, transform .1s; }
  .word-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .word-card .word { font-size: 1.1rem; font-weight: 700; color: var(--accent2); display: flex; align-items: center; gap: 8px; }
  .word-card .pos { font-size: 0.72rem; color: var(--yellow); background: rgba(245,158,11,.15); border-radius: 6px; padding: 2px 7px; font-weight: 600; }
  .word-card .meaning { margin-top: 6px; color: var(--text); font-size: 0.95rem; }
  .word-card .example { margin-top: 8px; color: var(--muted); font-size: 0.83rem; font-style: italic; border-left: 3px solid var(--accent); padding-left: 10px; }
  .audio-btn { background: none; border: none; color: var(--accent2); cursor: pointer; font-size: 1rem; padding: 2px; line-height: 1; transition: transform .15s; }
  .audio-btn:hover { transform: scale(1.2); }

  /* ── FLASHCARD ── */
  .fc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .fc-progress { font-size: 0.85rem; color: var(--muted); }
  .fc-controls { display: flex; gap: 8px; }
  .btn { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 0.85rem; transition: all .2s; font-weight: 500; }
  .btn:hover { border-color: var(--accent); color: var(--accent2); }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-accent:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  .fc-scene { perspective: 1000px; width: 100%; max-width: 520px; margin: 0 auto 28px; height: 300px; cursor: pointer; }
  .fc-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform .55s cubic-bezier(.4,0,.2,1); }
  .fc-inner.flipped { transform: rotateY(180deg); }
  .fc-face { position: absolute; inset: 0; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; backface-visibility: hidden; padding: 32px; text-align: center; }
  .fc-front { background: linear-gradient(135deg, #1e293b, #273548); border: 1px solid var(--border); }
  .fc-back { background: linear-gradient(135deg, #1a1f3c, #1e293b); border: 1px solid var(--accent); transform: rotateY(180deg); }
  .fc-word { font-size: 2.2rem; font-weight: 800; color: var(--accent2); margin-bottom: 8px; }
  .fc-hint { font-size: 0.8rem; color: var(--muted); margin-top: 12px; }
  .fc-pos { font-size: 0.8rem; color: var(--yellow); margin-bottom: 8px; }
  .fc-meaning { font-size: 1.4rem; font-weight: 700; color: var(--green); margin-bottom: 12px; }
  .fc-example { font-size: 0.88rem; color: var(--muted); font-style: italic; max-width: 380px; }

  .fc-nav { display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; }
  .nav-btn { width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 1.2rem; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .know-btns { display: flex; gap: 12px; }
  .know-yes { padding: 10px 24px; border-radius: 24px; border: none; background: var(--green); color: #fff; cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: opacity .2s; }
  .know-yes:hover { opacity: 0.85; }
  .know-no { padding: 10px 24px; border-radius: 24px; border: none; background: var(--red); color: #fff; cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: opacity .2s; }
  .know-no:hover { opacity: 0.85; }

  .fc-stats { display: flex; gap: 16px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
  .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 16px; font-size: 0.82rem; color: var(--muted); }
  .stat-pill span { font-weight: 700; }
  .stat-pill.green span { color: var(--green); }
  .stat-pill.red span { color: var(--red); }

  /* ── QUIZ ── */
  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .quiz-score { font-size: 0.9rem; color: var(--muted); }
  .progress-bar { background: var(--surface); border-radius: 10px; height: 6px; margin-bottom: 24px; }
  .progress-fill { background: var(--accent); height: 100%; border-radius: 10px; transition: width .4s; }
  .quiz-question { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; }
  .q-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
  .q-text { font-size: 1.3rem; font-weight: 700; color: var(--text); line-height: 1.4; }
  .q-sub { margin-top: 6px; font-size: 0.85rem; color: var(--muted); font-style: italic; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  @media (max-width: 500px) { .quiz-options { grid-template-columns: 1fr; } }
  .opt { background: var(--surface); border: 2px solid var(--border); border-radius: 12px; padding: 14px 18px; cursor: pointer; font-size: 0.95rem; text-align: left; color: var(--text); transition: all .2s; }
  .opt:hover:not(:disabled) { border-color: var(--accent); background: var(--surface2); }
  .opt.correct { border-color: var(--green); background: rgba(34,197,94,.12); color: var(--green); }
  .opt.wrong { border-color: var(--red); background: rgba(239,68,68,.1); color: var(--red); }
  .opt:disabled { cursor: default; }
  .quiz-feedback { background: var(--surface); border-radius: 12px; padding: 16px 20px; font-size: 0.9rem; display: none; }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.ok { border-left: 4px solid var(--green); }
  .quiz-feedback.err { border-left: 4px solid var(--red); }

  .quiz-result { text-align: center; padding: 48px 20px; }
  .result-score { font-size: 4rem; font-weight: 900; color: var(--accent2); }
  .result-label { font-size: 1.2rem; color: var(--muted); margin: 8px 0 24px; }
  .result-ring { width: 130px; height: 130px; border-radius: 50%; border: 8px solid var(--border); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 900; position: relative; }

  /* SEARCH */
  .search-box { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0 14px; margin-bottom: 20px; max-width: 380px; }
  .search-box input { background: none; border: none; color: var(--text); font-size: 0.95rem; padding: 11px 0; outline: none; flex: 1; }
  .search-box svg { color: var(--muted); flex-shrink: 0; }

  /* MODE SELECT */
  .mode-select { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .mode-btn { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 0.82rem; cursor: pointer; transition: all .2s; }
  .mode-btn.active { border-color: var(--accent); color: var(--accent2); background: rgba(99,102,241,.15); }
</style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2.2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
  <h1>Vocabulary – Payment Terms</h1>
  <span>24 từ</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('list')">📋 Danh sách</div>
  <div class="tab" onclick="switchTab('flash')">🃏 Flashcard</div>
  <div class="tab" onclick="switchTab('quiz')">✏️ Trắc nghiệm</div>
</div>

<!-- ═══════════ WORD LIST ═══════════ -->
<div id="tab-list" class="panel active">
  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" placeholder="Tìm từ vựng..." oninput="filterWords(this.value)">
  </div>
  <div class="word-grid" id="word-grid"></div>
</div>

<!-- ═══════════ FLASHCARD ═══════════ -->
<div id="tab-flash" class="panel">
  <div class="fc-header">
    <div class="fc-progress" id="fc-progress">Thẻ 1 / 24</div>
    <div class="fc-controls">
      <button class="btn" onclick="shuffleFlash()">🔀 Xáo trộn</button>
      <button class="btn" onclick="resetFlash()">↺ Reset</button>
    </div>
  </div>

  <div class="fc-scene" id="fc-scene" onclick="flipCard()">
    <div class="fc-inner" id="fc-inner">
      <div class="fc-face fc-front">
        <div class="fc-pos" id="fc-pos-f"></div>
        <div class="fc-word" id="fc-word"></div>
        <button class="audio-btn" style="font-size:1.5rem;margin-top:8px" onclick="event.stopPropagation();speakWord(currentFC().word)" title="Nghe phát âm">🔊</button>
        <div class="fc-hint">Nhấp để xem nghĩa</div>
      </div>
      <div class="fc-face fc-back">
        <div class="fc-pos" id="fc-pos-b"></div>
        <div class="fc-meaning" id="fc-meaning"></div>
        <div class="fc-example" id="fc-example"></div>
      </div>
    </div>
  </div>

  <div class="fc-nav">
    <button class="nav-btn" id="btn-prev" onclick="moveFC(-1)">‹</button>
    <div class="know-btns" id="know-btns">
      <button class="know-no" onclick="markFC(false)">✗ Chưa nhớ</button>
      <button class="know-yes" onclick="markFC(true)">✓ Đã nhớ</button>
    </div>
    <button class="nav-btn" id="btn-next" onclick="moveFC(1)">›</button>
  </div>

  <div class="fc-stats">
    <div class="stat-pill green">✓ Đã nhớ: <span id="stat-know">0</span></div>
    <div class="stat-pill red">✗ Chưa nhớ: <span id="stat-unknow">0</span></div>
    <div class="stat-pill">Còn lại: <span id="stat-left">24</span></div>
  </div>
</div>

<!-- ═══════════ QUIZ ═══════════ -->
<div id="tab-quiz" class="panel">
  <div id="quiz-main">
    <div class="mode-select">
      <span style="font-size:.82rem;color:var(--muted);line-height:2">Dạng câu hỏi:</span>
      <button class="mode-btn active" id="mode-en" onclick="setMode('en-vi')">Anh → Việt</button>
      <button class="mode-btn" id="mode-vi" onclick="setMode('vi-en')">Việt → Anh</button>
      <button class="mode-btn" id="mode-ex" onclick="setMode('example')">Điền vào câu</button>
      <button class="mode-btn" id="mode-mix" onclick="setMode('mix')">🎲 Hỗn hợp</button>
    </div>
    <div class="quiz-header">
      <span id="q-num" style="font-size:.9rem;color:var(--muted)">Câu 1 / 24</span>
      <span class="quiz-score">✅ <span id="q-correct">0</span> &nbsp;❌ <span id="q-wrong">0</span></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="q-progress" style="width:0%"></div></div>
    <div class="quiz-question">
      <div class="q-label" id="q-label">Từ tiếng Anh có nghĩa là gì?</div>
      <div class="q-text" id="q-text"></div>
      <div class="q-sub" id="q-sub"></div>
    </div>
    <div class="quiz-options" id="q-options"></div>
    <div class="quiz-feedback" id="q-feedback"></div>
    <div style="display:flex;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-accent" id="btn-next-q" onclick="nextQuestion()" style="display:none">Câu tiếp ›</button>
    </div>
  </div>
  <div id="quiz-result" style="display:none" class="quiz-result">
    <div class="result-ring" id="result-ring"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-label" id="result-label"></div>
    <button class="btn btn-accent" onclick="startQuiz()" style="margin:8px">↺ Làm lại</button>
    <button class="btn" onclick="setMode(quizMode);startQuiz()" style="margin:8px">🔀 Trộn lại</button>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────
const vocab = [
  { word:"customer",      pos:"n.",       meaning:"khách hàng",             example:"The customer is waiting for the invoice." },
  { word:"latest",        pos:"adj.",     meaning:"mới nhất",               example:"We discussed the latest order." },
  { word:"several",       pos:"adj.",     meaning:"một vài, nhiều",         example:"The drought lasted several months." },
  { word:"drought",       pos:"n.",       meaning:"hạn hán",                example:"The drought damaged crops." },
  { word:"flood",         pos:"n.",       meaning:"lũ lụt",                 example:"The flood blocked the roads." },
  { word:"thunder",       pos:"n.",       meaning:"sấm",                    example:"I heard thunder last night." },
  { word:"storm",         pos:"n.",       meaning:"cơn bão",                example:"The storm delayed the shipment." },
  { word:"tsunami",       pos:"n.",       meaning:"sóng thần",              example:"The tsunami hit the coast." },
  { word:"pandemic",      pos:"n.",       meaning:"đại dịch",               example:"The COVID-19 pandemic affected trade." },
  { word:"transmission",  pos:"n.",       meaning:"sự lây truyền",          example:"The transmission of the virus was rapid." },
  { word:"last",          pos:"adj./v.",  meaning:"trước; kéo dài",         example:"The festival will last for 10 days." },
  { word:"order",         pos:"n./v.",    meaning:"đơn hàng; đặt hàng",     example:"We placed another order." },
  { word:"regulation",    pos:"n.",       meaning:"quy định",               example:"We must follow the regulations." },
  { word:"cash flow",     pos:"n.",       meaning:"dòng tiền",              example:"The company has cash flow problems." },
  { word:"ability",       pos:"n.",       meaning:"khả năng",               example:"She has the ability to solve problems." },
  { word:"deliver",       pos:"v.",       meaning:"giao hàng",              example:"They deliver goods on time." },
  { word:"solve",         pos:"v.",       meaning:"giải quyết",             example:"We solved the issue quickly." },
  { word:"appreciate",    pos:"v.",       meaning:"đánh giá cao, cảm kích", example:"We appreciate your business." },
  { word:"issue",         pos:"n.",       meaning:"vấn đề",                 example:"There is no issue with the order." },
  { word:"invoice",       pos:"n.",       meaning:"hóa đơn",               example:"Please check the invoice." },
  { word:"payment terms", pos:"n.",       meaning:"điều khoản thanh toán",  example:"We agreed to 30-day payment terms." },
  { word:"extension",     pos:"n.",       meaning:"gia hạn",               example:"They requested an extension." },
  { word:"exception",     pos:"n.",       meaning:"ngoại lệ",              example:"We can make an exception this time." },
  { word:"confirmation",  pos:"n.",       meaning:"xác nhận",              example:"I received the email confirmation." }
];

// ── UTILS ─────────────────────────────────────────────────────────
function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function speakWord(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const tabs=['list','flash','quiz'];
    t.classList.toggle('active', tabs[i]===name);
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if (name==='flash') renderFC();
  if (name==='quiz') { if (!quizStarted) startQuiz(); }
}

// ── WORD LIST ──────────────────────────────────────────────────────
function renderWordList(list) {
  const g = document.getElementById('word-grid');
  g.innerHTML = list.map(v=>`
    <div class="word-card">
      <div class="word">
        ${v.word}
        <span class="pos">${v.pos}</span>
        <button class="audio-btn" onclick="speakWord('${v.word}')" title="Nghe">🔊</button>
      </div>
      <div class="meaning">${v.meaning}</div>
      <div class="example">${v.example}</div>
    </div>
  `).join('');
}
function filterWords(q) {
  const r = q.toLowerCase();
  renderWordList(vocab.filter(v=> v.word.toLowerCase().includes(r) || v.meaning.includes(r)));
}
renderWordList(vocab);

// ── FLASHCARD ─────────────────────────────────────────────────────
let fcDeck = [...vocab];
let fcIdx = 0;
let fcKnow = 0, fcUnknow = 0;

function currentFC() { return fcDeck[fcIdx]; }
function renderFC() {
  const v = currentFC();
  document.getElementById('fc-word').textContent = v.word;
  document.getElementById('fc-pos-f').textContent = v.pos;
  document.getElementById('fc-pos-b').textContent = v.pos;
  document.getElementById('fc-meaning').textContent = v.meaning;
  document.getElementById('fc-example').textContent = v.example;
  document.getElementById('fc-progress').textContent = `Thẻ ${fcIdx+1} / ${fcDeck.length}`;
  document.getElementById('fc-inner').classList.remove('flipped');
  document.getElementById('btn-prev').disabled = fcIdx === 0;
  document.getElementById('btn-next').disabled = fcIdx === fcDeck.length-1;
  document.getElementById('stat-left').textContent = fcDeck.length - fcKnow - fcUnknow;
}
function flipCard() { document.getElementById('fc-inner').classList.toggle('flipped'); }
function moveFC(d) { fcIdx = Math.max(0, Math.min(fcDeck.length-1, fcIdx+d)); renderFC(); }
function shuffleFlash() { fcDeck = shuffle(vocab); fcIdx=0; fcKnow=0; fcUnknow=0; updateStats(); renderFC(); }
function resetFlash() { fcDeck=[...vocab]; fcIdx=0; fcKnow=0; fcUnknow=0; updateStats(); renderFC(); }
function markFC(known) {
  if (known) fcKnow++; else fcUnknow++;
  updateStats();
  if (fcIdx < fcDeck.length-1) { fcIdx++; renderFC(); }
}
function updateStats() {
  document.getElementById('stat-know').textContent = fcKnow;
  document.getElementById('stat-unknow').textContent = fcUnknow;
  document.getElementById('stat-left').textContent = fcDeck.length - fcKnow - fcUnknow;
}
renderFC();

// ── QUIZ ──────────────────────────────────────────────────────────
let quizMode = 'en-vi';
let quizDeck = [];
let qIdx = 0, qCorrect = 0, qWrong = 0;
let quizStarted = false;
let answered = false;

function setMode(m) {
  quizMode = m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  const map = {'en-vi':'mode-en','vi-en':'mode-vi','example':'mode-ex','mix':'mode-mix'};
  document.getElementById(map[m]).classList.add('active');
  startQuiz();
}

function startQuiz() {
  quizDeck = shuffle(vocab);
  qIdx = 0; qCorrect = 0; qWrong = 0;
  answered = false;
  quizStarted = true;
  document.getElementById('quiz-main').style.display = '';
  document.getElementById('quiz-result').style.display = 'none';
  document.getElementById('q-feedback').className = 'quiz-feedback';
  document.getElementById('btn-next-q').style.display = 'none';
  renderQuestion();
}

function getMode() {
  if (quizMode === 'mix') {
    const modes = ['en-vi','vi-en','example'];
    return modes[Math.floor(Math.random()*modes.length)];
  }
  return quizMode;
}

function renderQuestion() {
  answered = false;
  const v = quizDeck[qIdx];
  const mode = getMode();
  document.getElementById('q-feedback').className = 'quiz-feedback';
  document.getElementById('btn-next-q').style.display = 'none';

  const total = quizDeck.length;
  document.getElementById('q-num').textContent = `Câu ${qIdx+1} / ${total}`;
  document.getElementById('q-correct').textContent = qCorrect;
  document.getElementById('q-wrong').textContent = qWrong;
  document.getElementById('q-progress').style.width = `${(qIdx/total)*100}%`;

  let qText, qSub, qLabel, correctAns, opts;

  if (mode === 'en-vi') {
    qLabel = 'Từ tiếng Anh có nghĩa là gì?';
    qText = v.word + ' &nbsp;<button class="audio-btn" onclick="speakWord(\'' + v.word + '\')" style="font-size:1.1rem">🔊</button>';
    qSub = `(${v.pos})`;
    correctAns = v.meaning;
    opts = getOpts4('meaning', v);
  } else if (mode === 'vi-en') {
    qLabel = 'Từ tiếng Việt dịch sang tiếng Anh là gì?';
    qText = v.meaning;
    qSub = `(${v.pos})`;
    correctAns = v.word;
    opts = getOpts4('word', v);
  } else {
    // fill-in example
    qLabel = 'Chọn từ đúng để hoàn thành câu:';
    const blank = v.example.replace(new RegExp(v.word, 'i'), '_____');
    qText = blank;
    qSub = `Gợi ý: ${v.meaning}`;
    correctAns = v.word;
    opts = getOpts4('word', v);
  }

  document.getElementById('q-label').textContent = qLabel;
  document.getElementById('q-text').innerHTML = qText;
  document.getElementById('q-sub').textContent = qSub;

  const container = document.getElementById('q-options');
  container.innerHTML = '';
  const shuffledOpts = shuffle(opts);
  shuffledOpts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = o;
    btn.onclick = () => checkAnswer(btn, o, correctAns, v);
    container.appendChild(btn);
  });
}

function getOpts4(field, v) {
  const correct = v[field];
  const others = shuffle(vocab.filter(x=>x[field]!==correct)).slice(0,3).map(x=>x[field]);
  return [correct, ...others];
}

function checkAnswer(btn, chosen, correct, v) {
  if (answered) return;
  answered = true;
  const opts = document.querySelectorAll('.opt');
  opts.forEach(o => {
    o.disabled = true;
    if (o.textContent === correct) o.classList.add('correct');
  });
  const fb = document.getElementById('q-feedback');
  if (chosen === correct) {
    btn.classList.add('correct');
    qCorrect++;
    fb.className = 'quiz-feedback show ok';
    fb.innerHTML = `✅ <strong>Chính xác!</strong> &nbsp;<em>${v.word}</em> = ${v.meaning}`;
  } else {
    btn.classList.add('wrong');
    qWrong++;
    fb.className = 'quiz-feedback show err';
    fb.innerHTML = `❌ <strong>Sai rồi.</strong> Đáp án đúng: <strong>${correct}</strong> &nbsp;|&nbsp; <em>${v.example}</em>`;
  }
  document.getElementById('q-correct').textContent = qCorrect;
  document.getElementById('q-wrong').textContent = qWrong;
  if (qIdx < quizDeck.length-1) {
    document.getElementById('btn-next-q').style.display = '';
  } else {
    setTimeout(showResult, 900);
  }
}

function nextQuestion() {
  qIdx++;
  renderQuestion();
}

function showResult() {
  document.getElementById('quiz-main').style.display = 'none';
  const res = document.getElementById('quiz-result');
  res.style.display = '';
  const total = quizDeck.length;
  const pct = Math.round((qCorrect/total)*100);
  const ring = document.getElementById('result-ring');
  const color = pct>=80?'var(--green)':pct>=50?'var(--yellow)':'var(--red)';
  ring.style.borderColor = color;
  ring.style.color = color;
  ring.innerHTML = pct+'%';
  document.getElementById('result-score').textContent = `${qCorrect} / ${total}`;
  const labels = pct===100?'🎉 Hoàn hảo! Xuất sắc!':pct>=80?'🌟 Rất tốt! Tiếp tục phát huy!':pct>=60?'👍 Khá ổn! Hãy ôn lại những từ sai':pct>=40?'📚 Cần cố gắng thêm!':'💪 Hãy xem lại danh sách từ và thử lại!';
  document.getElementById('result-label').textContent = labels;
}
</script>
